<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillBridge AI - Enhanced with OpenAI</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .typing-indicator {
            display: inline-flex;
            align-items: center;
            padding: 8px 12px;
            background: #f3f4f6;
            border-radius: 8px;
        }
        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #6b7280;
            margin: 0 2px;
            animation: typing 1.4s infinite;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }
        .voice-wave {
            display: inline-flex;
            align-items: center;
            gap: 2px;
        }
        .voice-bar {
            width: 3px;
            background: #3b82f6;
            border-radius: 2px;
            animation: wave 1s ease-in-out infinite;
        }
        .voice-bar:nth-child(1) { height: 20px; animation-delay: 0s; }
        .voice-bar:nth-child(2) { height: 30px; animation-delay: 0.1s; }
        .voice-bar:nth-child(3) { height: 25px; animation-delay: 0.2s; }
        .voice-bar:nth-child(4) { height: 35px; animation-delay: 0.3s; }
        .voice-bar:nth-child(5) { height: 28px; animation-delay: 0.4s; }
        @keyframes wave {
            0%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(1.5); }
        }
        .countdown-timer {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .skill-progress {
            transition: all 0.5s ease-in-out;
        }
        .learning-card {
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        .learning-card:hover {
            border-color: #3b82f6;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;
        
        // OpenAI Service
        class OpenAIService {
            constructor(apiKey) {
                this.apiKey = apiKey;
                this.baseURL = 'https://api.openai.com/v1';
            }
            
            async analyzeResume(resumeText, jobDescription) {
                const prompt = `Analyze this resume against the job description and identify:
1. Required skills from the job description
2. Skills the candidate has from the resume
3. Skill gaps (missing or weak skills)
4. Proficiency level for each skill (Beginner/Intermediate/Advanced)

Resume: ${resumeText}
Job Description: ${jobDescription}

Respond in JSON format with this structure:
{
  "requiredSkills": [{"skill": "name", "level": "required", "category": "type"}],
  "candidateSkills": [{"skill": "name", "level": "current", "category": "type"}],
  "skillGaps": [{"skill": "name", "gap": "percentage", "priority": "high/medium/low"}],
  "overallMatch": "percentage"
}`;
                
                return this.callAPI(prompt);
            }
            
            async generateAssessmentQuestions(skillGaps, candidateSkills) {
                const prompt = `Generate 5 conversational assessment questions to evaluate real proficiency for these skills:
Skill Gaps: ${JSON.stringify(skillGaps)}
Current Skills: ${JSON.stringify(candidateSkills)}

Requirements:
- Make questions conversational and natural
- Focus on practical application, not just theory
- Include follow-up probes for depth
- Each question should have a time limit (2-5 minutes)
- Questions should test actual experience, not book knowledge

Respond in JSON format:
{
  "questions": [
    {
      "id": "q1",
      "skill": "skill_name",
      "question": "main question",
      "followUps": ["probe1", "probe2"],
      "timeLimit": "minutes",
      "difficulty": "easy/medium/hard"
    }
  ]
}`;
                
                return this.callAPI(prompt);
            }
            
            async evaluateResponse(question, response, skill) {
                const prompt = `Evaluate this candidate's response for ${skill} proficiency:
Question: ${question}
Response: ${response}

Evaluate on:
1. Technical accuracy (0-100)
2. Practical experience (0-100)
3. Communication clarity (0-100)
4. Problem-solving approach (0-100)
5. Overall proficiency level (Beginner/Intermediate/Advanced)
6. Specific feedback
7. Follow-up suggestions

Respond in JSON format:
{
  "scores": {
    "technical": 0,
    "practical": 0,
    "communication": 0,
    "problemSolving": 0,
    "overall": 0
  },
  "level": "Beginner/Intermediate/Advanced",
  "feedback": "specific feedback",
  "followUp": "suggested follow-up question"
}`;
                
                return this.callAPI(prompt);
            }
            
            async generateLearningPlan(skillGaps, candidateSkills, assessmentResults) {
                const prompt = `Generate a personalized learning plan based on:
Skill Gaps: ${JSON.stringify(skillGaps)}
Current Skills: ${JSON.stringify(candidateSkills)}
Assessment Results: ${JSON.stringify(assessmentResults)}

Requirements:
1. Focus on adjacent skills (build on existing knowledge)
2. Provide realistic time estimates
3. Include specific resources (courses, tutorials, projects)
4. Create a step-by-step roadmap
5. Include milestones and progress tracking
6. Prioritize by career impact and learning efficiency

Respond in JSON format:
{
  "learningPlan": {
    "title": "Personalized Learning Roadmap",
    "estimatedDuration": "weeks/months",
    "focusAreas": [
      {
        "skill": "skill_name",
        "priority": "high/medium/low",
        "adjacentSkills": ["skill1", "skill2"],
        "resources": [
          {
            "title": "resource_title",
            "type": "course/video/tutorial/project",
            "provider": "platform",
            "duration": "hours/days",
            "difficulty": "level",
            "url": "link",
            "whyRecommended": "reason"
          }
        ],
        "estimatedTime": "weeks",
        "milestones": ["milestone1", "milestone2"]
      }
    ],
    "weeklyPlan": [
      {
        "week": 1,
        "focus": "main focus",
        "tasks": ["task1", "task2"],
        "resources": ["resource1", "resource2"],
        "deliverables": ["project1", "quiz1"]
      }
    ]
  }
}`;
                
                return this.callAPI(prompt);
            }
            
            async callAPI(prompt) {
                try {
                    const response = await fetch(`${this.baseURL}/chat/completions`, {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${this.apiKey}`,
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            model: 'gpt-4',
                            messages: [
                                {
                                    role: 'system',
                                    content: 'You are an expert technical interviewer and learning strategist. Always respond in valid JSON format.'
                                },
                                {
                                    role: 'user',
                                    content: prompt
                                }
                            ],
                            temperature: 0.7,
                            max_tokens: 2000
                        })
                    });
                    
                    const data = await response.json();
                    return JSON.parse(data.choices[0].message.content);
                } catch (error) {
                    console.error('OpenAI API Error:', error);
                    return { error: error.message };
                }
            }
        }
        
        // Voice Recognition Service
        class VoiceRecognitionService {
            constructor() {
                this.recognition = null;
                this.isSupported = 'webkitSpeechRecognition' in window || 'SpeechRecognition' in window;
            }
            
            init() {
                if (!this.isSupported) return false;
                
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                this.recognition = new SpeechRecognition();
                this.recognition.continuous = false;
                this.recognition.interimResults = true;
                this.recognition.lang = 'en-US';
                
                return true;
            }
            
            startListening(onResult, onError, onEnd) {
                if (!this.recognition) return null;
                
                this.recognition.onresult = (event) => {
                    const transcript = Array.from(event.results)
                        .map(result => result[0])
                        .map(result => result.transcript)
                        .join('');
                    onResult(transcript);
                };
                
                this.recognition.onerror = (event) => {
                    onError(event.error);
                };
                
                this.recognition.onend = () => {
                    onEnd();
                };
                
                this.recognition.start();
                return this.recognition;
            }
            
            stopListening() {
                if (this.recognition) {
                    this.recognition.stop();
                }
            }
        }
        
        // Text-to-Speech Service
        class TextToSpeechService {
            constructor() {
                this.synthesis = window.speechSynthesis;
                this.isSupported = 'speechSynthesis' in window;
            }
            
            speak(text, options = {}) {
                if (!this.isSupported) return;
                
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.rate = options.rate || 1;
                utterance.pitch = options.pitch || 1;
                utterance.volume = options.volume || 1;
                utterance.voice = options.voice || null;
                
                this.synthesis.speak(utterance);
                return utterance;
            }
            
            stop() {
                if (this.synthesis) {
                    this.synthesis.cancel();
                }
            }
        }
        
        // Main App Component
        function App() {
            const [currentView, setCurrentView] = useState('api-setup');
            const [apiKey, setApiKey] = useState('');
            const [openaiService, setOpenaiService] = useState(null);
            const [voiceService, setVoiceService] = useState(null);
            const [ttsService, setTtsService] = useState(null);
            const [assessmentData, setAssessmentData] = useState({});
            
            useEffect(() => {
                const voice = new VoiceRecognitionService();
                const tts = new TextToSpeechService();
                setVoiceService(voice);
                setTtsService(tts);
            }, []);
            
            const handleApiKeySubmit = (key) => {
                setApiKey(key);
                const service = new OpenAIService(key);
                setOpenaiService(service);
                setCurrentView('onboarding');
            };
            
            return (
                <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100">
                    {currentView === 'api-setup' && (
                        <ApiSetup onApiKeySubmit={handleApiKeySubmit} />
                    )}
                    {currentView === 'onboarding' && (
                        <Onboarding 
                            openaiService={openaiService}
                            onComplete={(data) => {
                                setAssessmentData(data);
                                setCurrentView('assessment');
                            }} 
                        />
                    )}
                    {currentView === 'assessment' && (
                        <Assessment 
                            openaiService={openaiService}
                            voiceService={voiceService}
                            ttsService={ttsService}
                            assessmentData={assessmentData}
                            onComplete={(results) => {
                                setAssessmentData({...assessmentData, results});
                                setCurrentView('learning');
                            }} 
                        />
                    )}
                    {currentView === 'learning' && (
                        <Learning 
                            assessmentData={assessmentData}
                            onStartNew={() => setCurrentView('onboarding')} 
                        />
                    )}
                </div>
            );
        }
        
        // API Setup Component
        function ApiSetup({ onApiKeySubmit }) {
            const [apiKey, setApiKey] = useState('');
            const [isValidating, setIsValidating] = useState(false);
            
            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!apiKey.trim()) return;
                
                setIsValidating(true);
                // Simulate API key validation
                setTimeout(() => {
                    onApiKeySubmit(apiKey.trim());
                    setIsValidating(false);
                }, 1000);
            };
            
            return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="max-w-md w-full">
                        <div className="bg-white rounded-xl shadow-lg p-8">
                            <div className="text-center mb-6">
                                <div className="text-4xl mb-4">🔑</div>
                                <h1 className="text-2xl font-bold text-gray-900 mb-2">OpenAI API Setup</h1>
                                <p className="text-gray-600">Enter your OpenAI API key to enable AI-powered features</p>
                            </div>
                            
                            <form onSubmit={handleSubmit} className="space-y-4">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-2">
                                        API Key
                                    </label>
                                    <input
                                        type="password"
                                        value={apiKey}
                                        onChange={(e) => setApiKey(e.target.value)}
                                        placeholder="sk-..."
                                        className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                        required
                                    />
                                    <p className="text-xs text-gray-500 mt-1">
                                        Your API key is stored locally and never shared
                                    </p>
                                </div>
                                
                                <button
                                    type="submit"
                                    disabled={!apiKey.trim() || isValidating}
                                    className="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-lg transition-colors disabled:opacity-50"
                                >
                                    {isValidating ? 'Validating...' : 'Continue'}
                                </button>
                            </form>
                            
                            <div className="mt-6 p-4 bg-blue-50 rounded-lg">
                                <p className="text-sm text-blue-800">
                                    <strong>Need an API key?</strong><br/>
                                    Visit{' '}
                                    <a href="https://platform.openai.com/api-keys" target="_blank" className="underline">
                                        platform.openai.com/api-keys
                                    </a>
                                    {' '}to create one.
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }
        
        // Enhanced Onboarding Component
        function Onboarding({ openaiService, onComplete }) {
            const [resume, setResume] = useState(null);
            const [resumeText, setResumeText] = useState('');
            const [jobDescription, setJobDescription] = useState('');
            const [targetRole, setTargetRole] = useState('');
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [analysis, setAnalysis] = useState(null);
            
            const handleResumeUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    setResume(file);
                    // Simulate resume text extraction
                    setTimeout(() => {
                        setResumeText(`Resume for ${targetRole || 'Developer'}\n\nSkills: JavaScript, React, Node.js, HTML, CSS\nExperience: 3 years of web development\nProjects: E-commerce platform, Task management app\nEducation: Bachelor's in Computer Science`);
                    }, 1000);
                }
            };
            
            const handleAnalysis = async () => {
                if (!openaiService || !resumeText || !jobDescription) return;
                
                setIsAnalyzing(true);
                try {
                    const result = await openaiService.analyzeResume(resumeText, jobDescription);
                    setAnalysis(result);
                } catch (error) {
                    console.error('Analysis failed:', error);
                } finally {
                    setIsAnalyzing(false);
                }
            };
            
            const handleContinue = () => {
                if (analysis) {
                    onComplete({
                        resumeText,
                        jobDescription,
                        targetRole,
                        analysis
                    });
                }
            };
            
            return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="max-w-4xl w-full">
                        <div className="text-center mb-12">
                            <h1 className="text-4xl font-bold text-gray-900 mb-4">🚀 SkillBridge AI</h1>
                            <p className="text-xl text-gray-600 max-w-2xl mx-auto">
                                AI-powered skill assessment and personalized learning roadmap
                            </p>
                        </div>
                        
                        <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-8">
                            <h2 className="text-2xl font-bold text-gray-900 mb-6">Career Analysis Setup</h2>
                            <form onSubmit={(e) => { e.preventDefault(); handleAnalysis(); }} className="space-y-6">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-2">
                                        Upload Your Resume
                                    </label>
                                    <div className="border-2 border-dashed border-gray-300 rounded-lg p-6 text-center hover:border-blue-400 transition-colors">
                                        <input
                                            type="file"
                                            accept=".pdf,.doc,.docx"
                                            onChange={handleResumeUpload}
                                            className="hidden"
                                            id="resume-upload"
                                        />
                                        <label htmlFor="resume-upload" className="cursor-pointer">
                                            {resume ? (
                                                <div className="flex items-center justify-center">
                                                    <span className="text-green-600 font-medium">✅ {resume.name}</span>
                                                </div>
                                            ) : (
                                                <div>
                                                    <div className="text-4xl mb-2">📄</div>
                                                    <p className="text-gray-600">Click to upload your resume</p>
                                                    <p className="text-sm text-gray-500 mt-1">PDF, DOC, or DOCX</p>
                                                </div>
                                            )}
                                        </label>
                                    </div>
                                </div>
                                
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-2">
                                        Target Role
                                    </label>
                                    <input
                                        type="text"
                                        value={targetRole}
                                        onChange={(e) => setTargetRole(e.target.value)}
                                        placeholder="e.g., Data Science"
                                        className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                        required
                                    />
                                </div>
                                
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-2">
                                        Job Description
                                    </label>
                                    <textarea
                                        value={jobDescription}
                                        onChange={(e) => setJobDescription(e.target.value)}
                                        placeholder="Paste the job description you're targeting..."
                                        rows={6}
                                        className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"
                                        required
                                    />
                                </div>
                                
                                <button
                                    type="submit"
                                    disabled={!resume || !jobDescription || isAnalyzing}
                                    className="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 px-4 rounded-lg transition-colors disabled:opacity-50"
                                >
                                    {isAnalyzing ? '🔍 Analyzing with AI...' : '🤖 Analyze Skills & Gaps'}
                                </button>
                            </form>
                            
                            {analysis && (
                                <div className="mt-6 p-4 bg-green-50 rounded-lg">
                                    <h3 className="font-semibold text-green-800 mb-2">✅ Analysis Complete!</h3>
                                    <div className="text-sm text-green-700 space-y-1">
                                        <p>📊 Overall Match: {analysis.overallMatch || '75%'}</p>
                                        <p>🎯 Required Skills: {analysis.requiredSkills?.length || 5}</p>
                                        <p>📈 Skill Gaps Identified: {analysis.skillGaps?.length || 3}</p>
                                    </div>
                                    <button
                                        onClick={handleContinue}
                                        className="mt-4 w-full bg-green-600 hover:bg-green-700 text-white font-medium py-2 px-4 rounded-lg transition-colors"
                                    >
                                        Continue to Assessment →
                                    </button>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }
        
        // Enhanced Assessment Component
        function Assessment({ openaiService, voiceService, ttsService, assessmentData, onComplete }) {
            const [questions, setQuestions] = useState([]);
            const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const [isListening, setIsListening] = useState(false);
            const [timeRemaining, setTimeRemaining] = useState(0);
            const [assessmentResults, setAssessmentResults] = useState([]);
            const [currentQuestion, setCurrentQuestion] = useState(null);
            const messagesEndRef = useRef(null);
            const timerRef = useRef(null);
            
            useEffect(() => {
                if (openaiService && assessmentData.analysis) {
                    generateQuestions();
                }
            }, [openaiService, assessmentData]);
            
            useEffect(() => {
                messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [messages]);
            
            useEffect(() => {
                if (timeRemaining > 0) {
                    timerRef.current = setTimeout(() => {
                        setTimeRemaining(prev => prev - 1);
                    }, 1000);
                } else if (timeRemaining === 0 && input.trim()) {
                    handleSubmit();
                }
                
                return () => clearTimeout(timerRef.current);
            }, [timeRemaining, input]);
            
            const generateQuestions = async () => {
                try {
                    const result = await openaiService.generateAssessmentQuestions(
                        assessmentData.analysis.skillGaps || [],
                        assessmentData.analysis.candidateSkills || []
                    );
                    setQuestions(result.questions || []);
                    
                    // Start with first question
                    if (result.questions && result.questions.length > 0) {
                        askQuestion(result.questions[0]);
                    }
                } catch (error) {
                    console.error('Failed to generate questions:', error);
                }
            };
            
            const askQuestion = (question) => {
                setCurrentQuestion(question);
                setTimeRemaining((question.timeLimit || 3) * 60); // Convert to seconds
                setInput('');
                
                const questionMessage = {
                    id: Date.now().toString(),
                    type: 'ai',
                    content: `🎯 **Skill: ${question.skill}**\n\n${question.question}\n\n⏱️ You have ${question.timeLimit || 3} minutes to respond.\n\n💡 You can type your answer or use voice input.`,
                    timestamp: new Date(),
                    question: question
                };
                
                setMessages(prev => [...prev, questionMessage]);
                
                // Speak the question
                if (ttsService) {
                    setTimeout(() => {
                        ttsService.speak(`Question about ${question.skill}. ${question.question}`);
                    }, 500);
                }
            };
            
            const startListening = () => {
                if (!voiceService || !voiceService.init()) {
                    alert('Voice recognition is not supported in your browser. Please use Chrome.');
                    return;
                }
                
                setIsListening(true);
                voiceService.startListening(
                    (transcript) => {
                        setInput(transcript);
                    },
                    (error) => {
                        console.error('Voice recognition error:', error);
                        setIsListening(false);
                    },
                    () => {
                        setIsListening(false);
                    }
                );
            };
            
            const stopListening = () => {
                if (voiceService) {
                    voiceService.stopListening();
                }
                setIsListening(false);
            };
            
            const handleSubmit = async () => {
                if (!input.trim() || !currentQuestion) return;
                
                // Add user message
                const userMessage = {
                    id: Date.now().toString(),
                    type: 'user',
                    content: input,
                    timestamp: new Date()
                };
                setMessages(prev => [...prev, userMessage]);
                
                setIsTyping(true);
                setTimeRemaining(0);
                
                try {
                    // Evaluate response with OpenAI
                    const evaluation = await openaiService.evaluateResponse(
                        currentQuestion.question,
                        input,
                        currentQuestion.skill
                    );
                    
                    const result = {
                        question: currentQuestion,
                        response: input,
                        evaluation: evaluation
                    };
                    
                    setAssessmentResults(prev => [...prev, result]);
                    
                    // Show AI feedback
                    const feedbackMessage = {
                        id: Date.now().toString(),
                        type: 'ai',
                        content: `📊 **Evaluation Results**\n\n**Overall Score:** ${evaluation.scores?.overall || 0}/100\n**Level:** ${evaluation.level || 'Beginner'}\n\n**Feedback:** ${evaluation.feedback || 'Good response!'}\n\n${evaluation.followUp ? `**Follow-up:** ${evaluation.followUp}` : ''}`,
                        timestamp: new Date()
                    };
                    
                    setMessages(prev => [...prev, feedbackMessage]);
                    
                    // Speak feedback
                    if (ttsService) {
                        setTimeout(() => {
                            ttsService.speak(`Your response was evaluated. Overall score: ${evaluation.scores?.overall || 0} out of 100. ${evaluation.feedback || 'Good response!'}`);
                        }, 500);
                    }
                    
                    // Move to next question or complete assessment
                    setTimeout(() => {
                        if (currentQuestionIndex < questions.length - 1) {
                            const nextIndex = currentQuestionIndex + 1;
                            setCurrentQuestionIndex(nextIndex);
                            askQuestion(questions[nextIndex]);
                        } else {
                            completeAssessment();
                        }
                    }, 3000);
                    
                } catch (error) {
                    console.error('Evaluation failed:', error);
                    // Fallback to next question
                    setTimeout(() => {
                        if (currentQuestionIndex < questions.length - 1) {
                            const nextIndex = currentQuestionIndex + 1;
                            setCurrentQuestionIndex(nextIndex);
                            askQuestion(questions[nextIndex]);
                        } else {
                            completeAssessment();
                        }
                    }, 2000);
                } finally {
                    setIsTyping(false);
                    setInput('');
                }
            };
            
            const completeAssessment = () => {
                const completionMessage = {
                    id: Date.now().toString(),
                    type: 'ai',
                    content: '🎉 **Assessment Complete!**\n\nGreat job! I\'ve evaluated all your responses. Now I\'ll generate your personalized learning plan based on your strengths and areas for improvement.',
                    timestamp: new Date()
                };
                
                setMessages(prev => [...prev, completionMessage]);
                
                setTimeout(() => {
                    onComplete(assessmentResults);
                }, 3000);
            };
            
            const formatTime = (seconds) => {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${mins}:${secs.toString().padStart(2, '0')}`;
            };
            
            return (

                                        onClick={handleSubmit}

                                    >
                                        Submit
                                    </button>
                                </div>
                            </div>
                            {timeRemaining > 0 && timeRemaining < 30 && (
                                <div className="mt-2 text-red-600 text-sm">
                                    ⚠️ Time running out! Auto-submitting soon...
                                </div>
                            )}
                        </div>
                    </div>
                </div>

        }
