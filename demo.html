<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillBridge AI - Demo</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .typing-indicator {
            display: inline-flex;
            align-items: center;
            padding: 8px 12px;
            background: #f3f4f6;
            border-radius: 8px;
        }
        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #6b7280;
            margin: 0 2px;
            animation: typing 1.4s infinite;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // Main App Component
        function App() {
            const [currentView, setCurrentView] = useState('onboarding');
            const [assessmentData, setAssessmentData] = useState({});
            
            return (
                <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100">
                    {currentView === 'onboarding' && (
                        <Onboarding onComplete={(data) => {
                            setAssessmentData(data);
                            setCurrentView('assessment');
                        }} />
                    )}
                    {currentView === 'assessment' && (
                        <Assessment onComplete={() => setCurrentView('results')} />
                    )}
                    {currentView === 'results' && (
                        <Results onStartNew={() => setCurrentView('onboarding')} />
                    )}
                </div>
            );
        }
        
        // Onboarding Component
        function Onboarding({ onComplete }) {
            const [resume, setResume] = useState(null);
            const [jobDescription, setJobDescription] = useState('');
            const [targetRole, setTargetRole] = useState('');
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            
            const handleSubmit = (e) => {
                e.preventDefault();
                if (!resume || !jobDescription) return;
                
                setIsAnalyzing(true);
                setTimeout(() => {
                    onComplete({ resume, jobDescription, targetRole });
                }, 2000);
            };
            
            return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="max-w-4xl w-full">
                        <div className="text-center mb-12">
                            <h1 className="text-4xl font-bold text-gray-900 mb-4">🚀 SkillBridge AI</h1>
                            <p className="text-xl text-gray-600 max-w-2xl mx-auto">
                                Transform your career with AI-powered skill assessment and personalized learning
                            </p>
                        </div>
                        
                        <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-8">
                            <h2 className="text-2xl font-bold text-gray-900 mb-6">Get Started</h2>
                            <form onSubmit={handleSubmit} className="space-y-6">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-2">
                                        Upload Your Resume
                                    </label>
                                    <div className="border-2 border-dashed border-gray-300 rounded-lg p-6 text-center hover:border-blue-400 transition-colors">
                                        <input
                                            type="file"
                                            accept=".pdf"
                                            onChange={(e) => setResume(e.target.files[0])}
                                            className="hidden"
                                            id="resume-upload"
                                        />
                                        <label htmlFor="resume-upload" className="cursor-pointer">
                                            {resume ? (
                                                <div className="flex items-center justify-center">
                                                    <span className="text-green-600 font-medium">✅ {resume.name}</span>
                                                </div>
                                            ) : (
                                                <div>
                                                    <div className="text-4xl mb-2">📄</div>
                                                    <p className="text-gray-600">Click to upload your resume (PDF)</p>
                                                </div>
                                            )}
                                        </label>
                                    </div>
                                </div>
                                
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-2">
                                        Target Role
                                    </label>
                                    <input
                                        type="text"
                                        value={targetRole}
                                        onChange={(e) => setTargetRole(e.target.value)}
                                        placeholder="e.g., Data Science "
                                        className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                        required
                                    />
                                </div>
                                
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-2">
                                        Job Description
                                    </label>
                                    <textarea
                                        value={jobDescription}
                                        onChange={(e) => setJobDescription(e.target.value)}
                                        placeholder="Paste the job description you're targeting..."
                                        rows={6}
                                        className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"
                                        required
                                    />
                                </div>
                                
                                <button
                                    type="submit"
                                    disabled={!resume || !jobDescription || isAnalyzing}
                                    className="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 px-4 rounded-lg transition-colors disabled:opacity-50"
                                >
                                    {isAnalyzing ? (
                                        <span>⏳ Analyzing...</span>
                                    ) : (
                                        <span>Start Assessment →</span>
                                    )}
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            );
        }
        
        // Assessment Component
        function Assessment({ onComplete }) {
            const [messages, setMessages] = useState([
                { id: '1', type: 'ai', content: "Welcome to your skill assessment! I'll be asking you some questions about your experience and skills. Let's begin!", timestamp: new Date() }
            ]);
            const [input, setInput] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const [currentQuestion, setCurrentQuestion] = useState(0);
            const messagesEndRef = useRef(null);
            
            const questions = [
                "Can you explain your experience with React and describe a challenging project you've worked on?",
                "Describe your approach to testing web applications. What testing frameworks have you used?",
                "How do you approach debugging complex issues in production? Can you walk me through your process?"
            ];
            
            useEffect(() => {
                setTimeout(() => {
                    askQuestion(questions[0]);
                }, 2000);
            }, []);
            
            useEffect(() => {
                messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [messages]);
            
            const askQuestion = (question) => {
                setIsTyping(true);
                setTimeout(() => {
                    setMessages(prev => [...prev, {
                        id: Date.now().toString(),
                        type: 'ai',
                        content: question,
                        timestamp: new Date()
                    }]);
                    setIsTyping(false);
                }, 1500);
            };
            
            const handleSendMessage = () => {
                if (!input.trim()) return;
                
                setMessages(prev => [...prev, {
                    id: Date.now().toString(),
                    type: 'user',
                    content: input,
                    timestamp: new Date()
                }]);
                setInput('');
                
                setIsTyping(true);
                setTimeout(() => {
                    const responses = [
                        "That's interesting! Can you elaborate more on that approach?",
                        "Great explanation. How did you handle any challenges that came up?",
                        "Thank you for sharing that. Let's move on to our next question."
                    ];
                    
                    setMessages(prev => [...prev, {
                        id: Date.now().toString(),
                        type: 'ai',
                        content: responses[Math.floor(Math.random() * responses.length)],
                        timestamp: new Date()
                    }]);
                    setIsTyping(false);
                    
                    if (currentQuestion < questions.length - 1) {
                        setTimeout(() => {
                            setCurrentQuestion(prev => prev + 1);
                            askQuestion(questions[currentQuestion + 1]);
                        }, 1000);
                    } else {
                        setTimeout(() => {
                            onComplete();
                        }, 2000);
                    }
                }, 2000);
            };
            
            return (
                <div className="min-h-screen flex flex-col">
                    <div className="bg-white border-b border-gray-200 px-6 py-4">
                        <div className="max-w-4xl mx-auto flex items-center justify-between">
                            <div className="flex items-center space-x-3">
                                <div className="text-2xl">🤖</div>
                                <div>
                                    <h1 className="text-xl font-bold text-gray-900">Skill Assessment</h1>
                                    <p className="text-sm text-gray-600">Conversational Interview</p>
                                </div>
                            </div>
                            <div className="text-sm text-gray-600">
                                Question {currentQuestion + 1} of {questions.length}
                            </div>
                        </div>
                    </div>
                    
                    <div className="flex-1 overflow-y-auto px-6 py-6">
                        <div className="max-w-4xl mx-auto space-y-4">
                            {messages.map((message) => (
                                <div
                                    key={message.id}
                                    className={`flex items-start space-x-3 ${message.type === 'user' ? 'justify-end' : ''}`}
                                >
                                    {message.type === 'ai' && (
                                        <div className="flex-shrink-0">
                                            <div className="bg-blue-100 rounded-full p-2">🤖</div>
                                        </div>
                                    )}
                                    <div
                                        className={`max-w-2xl px-4 py-3 rounded-lg ${
                                            message.type === 'user'
                                                ? 'bg-blue-600 text-white'
                                                : 'bg-gray-100 text-gray-900'
                                        }`}
                                    >
                                        <p className="text-sm leading-relaxed">{message.content}</p>
                                    </div>
                                    {message.type === 'user' && (
                                        <div className="flex-shrink-0">
                                            <div className="bg-gray-200 rounded-full p-2">👤</div>
                                        </div>
                                    )}
                                </div>
                            ))}
                            
                            {isTyping && (
                                <div className="flex items-start space-x-3">
                                    <div className="flex-shrink-0">
                                        <div className="bg-blue-100 rounded-full p-2">🤖</div>
                                    </div>
                                    <div className="typing-indicator">
                                        <div className="typing-dot"></div>
                                        <div className="typing-dot"></div>
                                        <div className="typing-dot"></div>
                                    </div>
                                </div>
                            )}
                            
                            <div ref={messagesEndRef} />
                        </div>
                    </div>
                    
                    <div className="bg-white border-t border-gray-200 px-6 py-4">
                        <div className="max-w-4xl mx-auto">
                            <div className="flex items-end space-x-4">
                                <div className="flex-1">
                                    <textarea
                                        value={input}
                                        onChange={(e) => setInput(e.target.value)}
                                        onKeyPress={(e) => {
                                            if (e.key === 'Enter' && !e.shiftKey) {
                                                e.preventDefault();
                                                handleSendMessage();
                                            }
                                        }}
                                        placeholder="Type your response here..."
                                        className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"
                                        rows={3}
                                        disabled={isTyping}
                                    />
                                </div>
                                <button
                                    onClick={handleSendMessage}
                                    disabled={!input.trim() || isTyping}
                                    className="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg disabled:opacity-50"
                                >
                                    Send
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }
        
        // Results Component
        function Results({ onStartNew }) {
            const skills = [
                { name: 'React', score: 85, required: 90 },
                { name: 'TypeScript', score: 78, required: 85 },
                { name: 'Node.js', score: 65, required: 80 },
                { name: 'Testing', score: 60, required: 75 }
            ];
            
            const overallScore = 72;
            
            return (
                <div className="min-h-screen bg-gray-50 py-8">
                    <div className="max-w-7xl mx-auto px-6">
                        <div className="text-center mb-8">
                            <h1 className="text-3xl font-bold text-gray-900 mb-2">Assessment Results</h1>
                            <p className="text-gray-600">Your personalized skill evaluation</p>
                        </div>
                        
                        <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-8 mb-8">
                            <h2 className="text-2xl font-bold text-gray-900 mb-6">Overall Score</h2>
                            <div className="flex items-center justify-center">
                                <div className="relative">
                                    <div className="w-48 h-48 rounded-full border-8 border-gray-200 flex items-center justify-center">
                                        <div className="text-center">
                                            <div className="text-5xl font-bold text-blue-600">{overallScore}%</div>
                                            <div className="text-gray-600 mt-2">Score</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                            <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
                                <h3 className="text-xl font-bold text-gray-900 mb-4">Skills Breakdown</h3>
                                <div className="space-y-4">
                                    {skills.map((skill, index) => (
                                        <div key={index} className="space-y-2">
                                            <div className="flex items-center justify-between">
                                                <span className="font-medium text-gray-900">{skill.name}</span>
                                                <span className="text-sm font-medium text-blue-600">{skill.score}%</span>
                                            </div>
                                            <div className="w-full bg-gray-200 rounded-full h-2">
                                                <div 
                                                    className="bg-blue-600 h-2 rounded-full"
                                                    style={{ width: `${skill.score}%` }}
                                                />
                                            </div>
                                            <div className="flex items-center justify-between text-xs text-gray-500">
                                                <span>Required: {skill.required}%</span>
                                                <span>Gap: {skill.required - skill.score}%</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            
                            <div className="space-y-6">
                                <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
                                    <h3 className="text-xl font-bold text-gray-900 mb-4">Strengths</h3>
                                    <ul className="space-y-3">
                                        <li className="flex items-start">
                                            <div className="w-2 h-2 bg-green-600 rounded-full mt-2 mr-3"></div>
                                            <span className="text-gray-700">Strong React fundamentals</span>
                                        </li>
                                        <li className="flex items-start">
                                            <div className="w-2 h-2 bg-green-600 rounded-full mt-2 mr-3"></div>
                                            <span className="text-gray-700">Good problem-solving approach</span>
                                        </li>
                                    </ul>
                                </div>
                                
                                <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
                                    <h3 className="text-xl font-bold text-gray-900 mb-4">Areas for Improvement</h3>
                                    <ul className="space-y-3">
                                        <li className="flex items-start">
                                            <div className="w-2 h-2 bg-red-600 rounded-full mt-2 mr-3"></div>
                                            <span className="text-gray-700">Backend development experience</span>
                                        </li>
                                        <li className="flex items-start">
                                            <div className="w-2 h-2 bg-red-600 rounded-full mt-2 mr-3"></div>
                                            <span className="text-gray-700">Testing practices</span>
                                        </li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                        
                        <div className="text-center">
                            <div className="bg-gradient-to-r from-blue-600 to-purple-600 rounded-xl p-8 text-white">
                                <h3 className="text-2xl font-bold mb-2">Ready to Improve?</h3>
                                <p className="text-blue-100 mb-6">Get personalized learning recommendations</p>
                                <button 
                                    onClick={onStartNew}
                                    className="bg-white text-blue-600 font-bold py-3 px-8 rounded-lg hover:bg-gray-100 transition-colors"
                                >
                                    Start New Assessment
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }
        
        // Render the app
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
