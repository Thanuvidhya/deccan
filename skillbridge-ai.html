        // Voice Recognition Service
        class VoiceRecognitionService {
            constructor() {
                this.recognition = null;
                this.isSupported = 'webkitSpeechRecognition' in window || 'SpeechRecognition' in window;
            }
            
            init() {
                if (!this.isSupported) return false;
                
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                this.recognition = new SpeechRecognition();
                this.recognition.continuous = false;
                this.recognition.interimResults = true;
                this.recognition.lang = 'en-US';
                
                return true;
            }
            
            startListening(onResult, onError, onEnd) {
                if (!this.recognition) return null;
                
                this.recognition.onresult = (event) => {
                    const transcript = Array.from(event.results)
                        .map(result => result[0])
                        .map(result => result.transcript)
                        .join('');
                    onResult(transcript);
                };
                
                this.recognition.onerror = (event) => {
                    onError(event.error);
                };
                
                this.recognition.onend = () => {
                    onEnd();
                };
                
                this.recognition.start();
                return this.recognition;
            }
            
            stopListening() {
                if (this.recognition) {
                    this.recognition.stop();
                }
            }
        }
        
        // Text-to-Speech Service
        class TextToSpeechService {
            constructor() {
                this.synthesis = window.speechSynthesis;
                this.isSupported = 'speechSynthesis' in window;
            }
            
            speak(text, options = {}) {
                if (!this.isSupported) return;
                
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.rate = options.rate || 1;
                utterance.pitch = options.pitch || 1;
                utterance.volume = options.volume || 1;
                utterance.voice = options.voice || null;
                
                this.synthesis.speak(utterance);
                return utterance;
            }
            
            stop() {
                if (this.synthesis) {
                    this.synthesis.cancel();
                }
            }
        }
        
        // Camera Service
        class CameraService {
            constructor() {
                this.stream = null;
                this.video = null;
                this.isSupported = 'mediaDevices' in navigator;
            }
            
            async startCamera(videoElement) {
                if (!this.isSupported) {
                    throw new Error('Camera not supported in this browser');
                }
                
                try {
                    this.stream = await navigator.mediaDevices.getUserMedia({ 
                        video: true, 
                        audio: true 
                    });
                    
                    if (videoElement) {
                        videoElement.srcObject = this.stream;
                        this.video = videoElement;
                    }
                    
                    return this.stream;
                } catch (error) {
                    console.error('Camera access error:', error);
                    throw error;
                }
            }
            
            stopCamera() {
                if (this.stream) {
                    this.stream.getTracks().forEach(track => track.stop());
                    this.stream = null;
                }
                
                if (this.video) {
                    this.video.srcObject = null;
                    this.video = null;
                }
            }
            
            async takeSnapshot() {
                if (!this.video) return null;
                
                const canvas = document.createElement('canvas');
                canvas.width = this.video.videoWidth;
                canvas.height = this.video.videoHeight;
                
                const ctx = canvas.getContext('2d');
                ctx.drawImage(this.video, 0, 0);
                
                return canvas.toDataURL('image/jpeg');
            }
        }
        
        // Fullscreen Service
        class FullscreenService {
            constructor() {
                this.isSupported = 'fullscreenEnabled' in document;
            }
            
            async toggleFullscreen(element) {
                if (!this.isSupported) return false;
                
                try {
                    if (!document.fullscreenElement) {
                        await element.requestFullscreen();
                        return true;
                    } else {
                        await document.exitFullscreen();
                        return false;
                    }
                } catch (error) {
                    console.error('Fullscreen error:', error);
                    return false;
                }
            }
            
            isFullscreen() {
                return !!document.fullscreenElement;
            }
        }

                                                                    <span>{resource.duration}</span>
                                                                    <span>•</span>
                                                                    <span className="capitalize">{resource.difficulty}</span>
                                                                </div>
                                                            </div>
                                                            <a 
                                                                href={resource.url} 
                                                                target="_blank" 
                                                                rel="noopener noreferrer"
                                                                className="text-blue-600 hover:text-blue-700 ml-2"
                                                                title="Open resource"
                                                            >
                                                                🔗
                                                            </a>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                        
                                        <div>
                                            <h4 className="font-semibold text-gray-700 mb-2">🏆 Milestones:</h4>
                                            <div className="space-y-1">
                                                {area.milestones.map((milestone, milestoneIndex) => (
                                                    <div key={milestoneIndex} className="flex items-center">
                                                        <div className="w-2 h-2 bg-green-500 rounded-full mr-2"></div>
                                                        <span className="text-sm text-gray-700">{milestone}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                        
                        {/* Weekly Plan */}
                        <div className="mb-8">
                            <h2 className="text-2xl font-bold text-gray-900 mb-6">📅 Weekly Action Plan</h2>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                {learningPlan.weeklyPlan.map((week) => (
                                    <div key={week.week} className="bg-white rounded-lg border border-gray-200 p-4">
                                        <div className="flex items-center justify-between mb-3">
                                            <h3 className="font-bold text-gray-900">Week {week.week}</h3>
                                            <button
                                                onClick={() => setSelectedWeek(week.week)}
                                                className={`px-2 py-1 rounded text-sm ${
                                                    selectedWeek === week.week
                                                        ? 'bg-blue-600 text-white'
                                                        : 'bg-gray-200 text-gray-700'
                                                }`}
                                            >
                                                {selectedWeek === week.week ? 'Active' : 'View'}
                                            </button>
                                        </div>
                                        <h4 className="font-medium text-gray-800 mb-2">{week.focus}</h4>
                                        <div className="space-y-2">
                                            {week.tasks.slice(0, 2).map((task, taskIndex) => (
                                                <label key={taskIndex} className="flex items-center space-x-2 cursor-pointer">
                                                    <input
                                                        type="checkbox"
                                                        checked={completedTasks.has(task)}
                                                        onChange={() => toggleTask(task)}
                                                        className="rounded text-blue-600"
                                                    />
                                                    <span className={`text-sm ${completedTasks.has(task) ? 'line-through text-gray-500' : 'text-gray-700'}`}>
                                                        {task}
                                                    </span>
                                                </label>
                                            ))}
                                            {week.tasks.length > 2 && (
                                                <span className="text-sm text-gray-500">+{week.tasks.length - 2} more tasks</span>
                                            )}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                        
                        {/* Active Week Detail */}
                        {selectedWeek && learningPlan.weeklyPlan.find(w => w.week === selectedWeek) && (
                            <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-8">
                                <h3 className="text-xl font-bold text-gray-900 mb-4">
                                    📅 Week {selectedWeek} - {learningPlan.weeklyPlan.find(w => w.week === selectedWeek).focus}
                                </h3>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div>
                                        <h4 className="font-semibold text-gray-700 mb-3">✅ Tasks</h4>
                                        <div className="space-y-2">
                                            {learningPlan.weeklyPlan.find(w => w.week === selectedWeek).tasks.map((task, index) => (
                                                <label key={index} className="flex items-start space-x-2 cursor-pointer">
                                                    <input
                                                        type="checkbox"
                                                        checked={completedTasks.has(task)}
                                                        onChange={() => toggleTask(task)}
                                                        className="rounded text-blue-600 mt-1"
                                                    />
                                                    <span className={`text-sm ${completedTasks.has(task) ? 'line-through text-gray-500' : 'text-gray-700'}`}>
                                                        {task}
                                                    </span>
                                                </label>
                                            ))}
                                        </div>
                                    </div>
                                    <div>
                                        <h4 className="font-semibold text-gray-700 mb-3">🎯 Deliverables</h4>
                                        <div className="space-y-2">
                                            {learningPlan.weeklyPlan.find(w => w.week === selectedWeek).deliverables.map((deliverable, index) => (
                                                <div key={index} className="flex items-center">
                                                    <div className="w-2 h-2 bg-blue-500 rounded-full mr-2"></div>
                                                    <span className="text-sm text-gray-700">{deliverable}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                        
                        {/* Call to Action */}
                        <div className="text-center">
                            <div className="bg-gradient-to-r from-green-600 to-blue-600 rounded-xl p-8 text-white">
                                <h3 className="text-2xl font-bold mb-2">🚀 Your Personalized Learning Journey Starts Now!</h3>
                                <p className="text-green-100 mb-6">
                                    Follow your AI-generated roadmap and track your progress as you bridge skill gaps.
                                </p>
                                <div className="flex justify-center space-x-4">
                                    <button 
                                        onClick={onStartNew}
                                        className="bg-white text-green-600 font-bold py-3 px-8 rounded-lg hover:bg-gray-100 transition-colors"
                                    >
                                        🔄 New Assessment
                                    </button>
                                    <button className="bg-blue-800 text-white font-bold py-3 px-8 rounded-lg hover:bg-blue-900 transition-colors">
                                        📥 Download Plan
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }
        
        // Render the app
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
